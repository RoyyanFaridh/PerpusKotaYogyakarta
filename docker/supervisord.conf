[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:webserver]
command=php -S 0.0.0.0:%(ENV_PORT)s -t /app/public
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:scheduler]
command=bash -c "while true; do php /app/artisan schedule:run >> /dev/null 2>&1; sleep 60; done"
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null